<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
html, body { margin: 0; padding: 0; overflow: hidden; background: #fff; }
#graph { width: 100%; }
#legend {
    position: absolute; top: 8px; left: 8px; background: rgba(255,255,255,0.92);
    padding: 8px 12px; border-radius: 6px; font-size: 12px; color: #333;
    pointer-events: none; z-index: 10; line-height: 1.8;
}
#legend .row { white-space: nowrap; }
#legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; vertical-align: middle; margin-right: 2px; }
#legend .line { display: inline-block; width: 20px; height: 2px; vertical-align: middle; margin-right: 2px; }
#legend .line.dashed { border-top: 2px dashed; height: 0; }
#legend .line.solid { border-top: 2px solid; height: 0; }
#download-btn {
    position: absolute; top: 8px; right: 48px; z-index: 10;
    width: 32px; height: 32px; border: none; border-radius: 6px;
    background: rgba(255,255,255,0.92); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.7; transition: opacity 0.2s;
}
#download-btn:hover { opacity: 1; }
#download-btn svg { width: 18px; height: 18px; fill: #555; }
#fullscreen-btn {
    position: absolute; top: 8px; right: 8px; z-index: 10;
    width: 32px; height: 32px; border: none; border-radius: 6px;
    background: rgba(255,255,255,0.92); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.7; transition: opacity 0.2s;
}
#fullscreen-btn:hover { opacity: 1; }
#fullscreen-btn svg { width: 18px; height: 18px; fill: #555; }
/* In fullscreen the container fills the screen; keep the themed background so
   the graph doesn't fall back to the browser's default black backdrop. */
#container:fullscreen { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="container" style="position: relative;">
    <div id="graph"></div>
    <div id="legend"></div>
    <button id="fullscreen-btn" title="Fullscreen" style="display:none;" onclick="toggleFullscreen()">
        <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    </button>
    <button id="download-btn" title="Download as PNG" style="display:none;" onclick="downloadGraph()">
        <svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2zm7-18L5.33 9h3.84v6h3.66V9h3.84L12 2z" transform="rotate(180 12 12)"/></svg>
    </button>
</div>
<script>
// Streamlit component communication
function sendToStreamlit(type, data) {
    window.parent.postMessage(Object.assign({isStreamlitMessage: true, type: type}, data || {}), "*");
}

// Report a Find-selected node to Streamlit, matching the selectNode payload, so
// the details/status panel reflects the found node. selectNodes() alone does not
// fire selectNode, so a Find focus would otherwise leave the panel out of sync
// with the highlighted node (PR #144 review P2).
function sendFindSelection(id) {
    try {
        var ds = network && network.body && network.body.data && network.body.data.nodes;
        var nd = ds && ds.get(id);
        if (nd) {
            sendToStreamlit("streamlit:setComponentValue", {
                value: {nodeId: id, ntype: nd.ntype || null, ename: nd.ename || null,
                        label: nd.label, title: nd.title || '', selected: true}
            });
        }
    } catch (e) {}
}

var visLoaded = false;
var pendingArgs = null;
var network = null;
var autofitOn = false;
var webDownload = true;  // browser download works on the web; on desktop we save via Python
var lastSeq = null;
var lastNodes = null;
var lastEdges = null;
var currentTheme = {bg: '#ffffff', panel: 'rgba(255,255,255,0.92)', text: '#333333'};
var currentHeight = 600;  // last non-fullscreen graph height, restored on exit
var fsRestoreView = null;  // viewport captured just before a fullscreen toggle
var FS_ZOOM_OUT = 0.65;    // entering fullscreen zooms out ~35% around the centre

// When "Fit to window" is on, fill the available window height instead of using
// the fixed Graph Height. Reads the parent window's height and this iframe's
// position in it (same-origin), reserving room for the status bar below.
function autofitHeight() {
    try {
        var fe = window.frameElement;
        var top = fe ? fe.getBoundingClientRect().top : 0;
        var avail = window.parent.innerHeight - top - 90;
        return Math.max(Math.round(avail), 300);
    } catch (e) {
        return null;  // cross-origin or unavailable: fall back to fixed height
    }
}

function applyHeight(h) {
    document.getElementById('graph').style.height = h + 'px';
    sendToStreamlit("streamlit:setFrameHeight", {height: h});
}

// Apply theme colours without rebuilding the graph, so a theme change (or the
// first-render theme settling) doesn't reset the user's zoom/pan. Node colours
// encode type, not theme, so only the background, overlays and edge labels change.
function applyTheme(theme) {
    theme = theme || {bg: '#ffffff', panel: 'rgba(255,255,255,0.92)', text: '#333333'};
    currentTheme = theme;
    document.documentElement.style.background = theme.bg;
    document.body.style.background = theme.bg;
    document.getElementById('container').style.background = theme.bg;
    var dlBtn = document.getElementById('download-btn');
    if (dlBtn) {
        dlBtn.style.background = theme.panel;
        var dlSvg = dlBtn.querySelector('svg');
        if (dlSvg) dlSvg.style.fill = theme.text;
    }
    var fsBtn = document.getElementById('fullscreen-btn');
    if (fsBtn) {
        fsBtn.style.background = theme.panel;
        var fsSvg = fsBtn.querySelector('svg');
        if (fsSvg) fsSvg.style.fill = theme.text;
    }
    var legendEl = document.getElementById('legend');
    if (legendEl) { legendEl.style.background = theme.panel; legendEl.style.color = theme.text; }
    if (network) {
        network.setOptions({edges: {font: {color: theme.text, strokeColor: theme.bg, strokeWidth: 4}}});
    }
}

function autofitApply() {
    if (!autofitOn || !network || isFullscreen()) return;
    var h = autofitHeight();
    if (h) { applyHeight(h); network.redraw(); }
}
window.addEventListener('resize', autofitApply);
// The fit-to-window height depends on this iframe's position, which shifts when
// controls above it change (e.g. the "Filter Classes" expander opening or
// closing) — layout changes that don't fire a 'resize' event. Poll for a
// position change and re-fit, so the graph grows back after such a shift
// instead of staying stuck at a height computed for the old position (bug B2).
var _lastFitTop = null;
setInterval(function() {
    if (!autofitOn || !network) return;
    var t;
    try {
        t = window.frameElement ? Math.round(window.frameElement.getBoundingClientRect().top) : 0;
    } catch (e) { return; }
    if (t !== _lastFitTop) { _lastFitTop = t; autofitApply(); }
}, 400);

function downloadGraph() {
    if (!network) return;
    var canvas = network.canvas.frame.canvas;
    var dataUrl = canvas.toDataURL('image/png');
    if (webDownload) {
        var a = document.createElement('a');
        a.download = 'ontology-graph.png';
        a.href = dataUrl;
        a.click();
    } else {
        // Desktop webview can't download; hand the PNG to Python to save to disk.
        sendToStreamlit('streamlit:setComponentValue', {value: {pngData: dataUrl, reqId: Date.now()}});
    }
}

// True when the document is fullscreen, checking the prefixed property too so a
// WebKit implementation isn't misread as "not fullscreen" (review P3).
function isFullscreen() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement);
}

// Enter/exit fullscreen for just the graph. The whole vis-network canvas lives
// in this iframe, so fullscreening the container makes the graph fill the
// physical screen — no sidebar, no toolbar, no black borders (issue #177).
// Before entering, remember the current viewport so exiting can put it back.
function toggleFullscreen() {
    var c = document.getElementById('container');
    if (!isFullscreen()) {
        if (network) {
            try { fsRestoreView = {scale: network.getScale(), position: network.getViewPosition()}; }
            catch (e) { fsRestoreView = null; }
        }
        (c.requestFullscreen || c.webkitRequestFullscreen || function () {}).call(c);
    } else {
        (document.exitFullscreen || document.webkitExitFullscreen || function () {}).call(document);
    }
}

// Resize the graph to fill the screen on enter and back to the toolbar-driven
// height on exit, and swap the icon/hint. On enter the graph zooms out ~35%
// around the same centre so fullscreen reveals more context without shrinking a
// large graph to an unreadable whole-graph fit; on exit the pre-fullscreen
// viewport is restored, so a round-trip leaves the user's zoom/pan untouched
// (review P2). vis rescales the view on each of the several 'resize' events it
// fires while the canvas changes size, and a moveTo() *inside* that emit is
// overwritten by vis — so we re-apply after each resize via a deferred call
// (which sticks) and detach after a window so we never fight the user later.
function onFullscreenChange() {
    var el = document.getElementById('graph');
    var fsBtn = document.getElementById('fullscreen-btn');
    var entering = isFullscreen();
    function applyView() {
        if (!network || !fsRestoreView) return;
        var scale = entering ? fsRestoreView.scale * FS_ZOOM_OUT : fsRestoreView.scale;
        try { network.moveTo({scale: scale, position: fsRestoreView.position}); } catch (e) {}
    }
    if (entering) {
        el.style.height = window.innerHeight + 'px';
        if (fsBtn) {
            fsBtn.title = 'Exit fullscreen';
            fsBtn.querySelector('svg').innerHTML =
                '<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>';
        }
    } else {
        if (fsBtn) {
            fsBtn.title = 'Fullscreen';
            fsBtn.querySelector('svg').innerHTML =
                '<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>';
        }
        var h = autofitOn ? (autofitHeight() || currentHeight) : currentHeight;
        el.style.height = h + 'px';
        sendToStreamlit("streamlit:setFrameHeight", {height: h});
    }
    if (network) {
        network.redraw();
        applyView();  // handles the case where no 'resize' fires at all
        var onResize = function () { setTimeout(applyView, 0); };
        try {
            network.on('resize', onResize);
            setTimeout(function () { try { network.off('resize', onResize); } catch (e) {} }, 1000);
        } catch (e) {}
    }
}
document.addEventListener('fullscreenchange', onFullscreenChange);
document.addEventListener('webkitfullscreenchange', onFullscreenChange);
// Fullscreen from inside an iframe needs the frame to permit it. Streamlit's
// component iframe is same-origin, so grant it defensively (belt and braces on
// top of Streamlit's own allowFullScreen).
try {
    var _fe = window.frameElement;
    if (_fe) { _fe.allowFullscreen = true; _fe.setAttribute('allow', 'fullscreen'); }
} catch (e) {}

function renderGraph(args) {
    if (!visLoaded) { pendingArgs = args; return; }
    autofitOn = !!args.autofit;
    webDownload = args.web_download !== false;

    // Rebuild only when the graph data actually changes: the render seq (Render
    // button) or the node/edge set (filters, focus). A selection click is a
    // same-data re-render — rebuilding would reset zoom/pan, and re-applying the
    // selection here would fight the click (selected_node lags one rerun behind,
    // causing a snap-back to the previous node). So on a same-data re-render just
    // refresh theme and height; leave the network, its viewport and its
    // selection exactly as the user left them.
    if (network && args.seq === lastSeq && args.nodes === lastNodes && args.edges === lastEdges) {
        applyTheme(args.theme);
        var hh = autofitOn ? autofitHeight() : (args.height || 600);
        if (hh) { currentHeight = hh; if (!isFullscreen()) applyHeight(hh); }
        // A fresh "Find entity" pick is a same-data re-render (only focus_seq
        // changed), so centre on the new node here without rebuilding the whole
        // network (issue #144). Anything that isn't a new pick leaves the
        // viewport and selection exactly as the user left them.
        var _sf = {};
        try { _sf = JSON.parse(sessionStorage.getItem('viz_find') || '{}') || {}; } catch (e) {}
        if (_sf.seq !== args.focus_seq) {
            var _sds = network.body && network.body.data && network.body.data.nodes;
            var _spin = (args.focus_node && _sds && _sds.get(args.focus_node)) ? args.focus_node : null;
            if (_spin) {
                try { network.selectNodes([_spin]); } catch (e) {}
                try { network.focus(_spin, {scale: 1.1, animation: {duration: 700, easingFunction: 'easeInOutQuad'}}); } catch (e) {}
                sendFindSelection(_spin);
            }
            try {
                sessionStorage.setItem('viz_find', JSON.stringify(
                    {seq: args.focus_seq, released: false, centred: !!_spin}));
            } catch (e) {}
        }
        return;
    }
    lastSeq = args.seq;
    lastNodes = args.nodes;
    lastEdges = args.edges;

    var height = args.height || 600;
    if (autofitOn) {
        var af = autofitHeight();
        if (af) height = af;
    }
    var el = document.getElementById('graph');
    // In fullscreen the graph fills the screen; don't clobber that with the
    // toolbar height. Remember the requested height so exiting fullscreen can
    // restore it.
    currentHeight = height;
    if (!isFullscreen()) {
        el.style.height = height + 'px';
        sendToStreamlit("streamlit:setFrameHeight", {height: height});
    }

    // Theme the canvas + overlays to match the app, so the graph isn't a white
    // box in dark mode (issue #62). Defaults keep the original light look.
    var theme = args.theme || {bg: '#ffffff', panel: 'rgba(255,255,255,0.92)', text: '#333333'};
    currentTheme = theme;
    document.documentElement.style.background = theme.bg;
    document.body.style.background = theme.bg;
    document.getElementById('container').style.background = theme.bg;
    var fsBtn2 = document.getElementById('fullscreen-btn');
    if (fsBtn2) {
        fsBtn2.style.background = theme.panel;
        var fsSvg2 = fsBtn2.querySelector('svg');
        if (fsSvg2) fsSvg2.style.fill = theme.text;
    }
    var dlBtn = document.getElementById('download-btn');
    dlBtn.style.background = theme.panel;
    var dlSvg = dlBtn.querySelector('svg');
    if (dlSvg) dlSvg.style.fill = theme.text;

    var nodeArr = JSON.parse(args.nodes);
    var edges = new vis.DataSet(JSON.parse(args.edges));
    var options = JSON.parse(args.options);
    // Theme edge labels: light text with a background-coloured halo (not a hard
    // white stroke), so labels read cleanly over edges in both light and dark
    // and don't turn into white blobs in dark mode (issue #62).
    options.edges = options.edges || {};
    options.edges.font = Object.assign({}, options.edges.font, {
        color: theme.text, strokeColor: theme.bg, strokeWidth: 4
    });
    var nCount = nodeArr.length;
    options.physics = options.physics || {};

    // Cache the computed layout so a re-mount (e.g. toggling the side panel)
    // restores node positions instantly instead of re-running physics and
    // flickering. Keyed by the render seq + node set, so clicking Render still
    // recomputes a fresh layout. Stored in sessionStorage (NOT localStorage) so
    // the cache is scoped to this browser session: same-origin iframe re-mounts
    // within the tab still share it, but a brand-new session starts fresh. With
    // localStorage the saved zoom/pan/positions leaked across sessions — the
    // render seq resets to 0 on a fresh session and the node-set hash is stable
    // for the same ontology, so an old session's viewport was restored.
    function _hash(s) {
        var h = 0;
        for (var i = 0; i < s.length; i++) { h = (h * 31 + s.charCodeAt(i)) | 0; }
        return h;
    }
    var nodeHash = _hash(nodeArr.map(function(n) { return n.id; }).sort().join('|'));
    var savedPos = null, savedView = null, pinnedIds = [];
    var _raw = null;
    try { _raw = JSON.parse(sessionStorage.getItem('viz_pos') || 'null'); } catch (e) {}

    var usedSaved = false;
    if (_raw && _raw.seq === args.seq && _raw.hash === nodeHash && _raw.pos) {
        // Exact same graph: restore every position with physics off — no
        // stabilization, no flicker.
        savedPos = _raw.pos;
        savedView = _raw.view || null;  // {scale, position}
        nodeArr.forEach(function(n) {
            if (savedPos[n.id]) { n.x = savedPos[n.id].x; n.y = savedPos[n.id].y; }
        });
        options.physics.enabled = false;
        usedSaved = true;
    } else if (_raw && _raw.seq === args.seq && _raw.pos) {
        // Same render generation but a changed node set — e.g. a Ctrl/Cmd-click
        // expand revealed new nodes. Freeze the nodes we already placed exactly
        // where they are and let physics settle only the new ones around them,
        // so the graph doesn't jump (issue #141). Existing nodes are pinned for
        // the stabilization pass, then released so they stay draggable.
        savedView = _raw.view || null;  // hold the camera steady too
        nodeArr.forEach(function(n) {
            if (_raw.pos[n.id]) {
                n.x = _raw.pos[n.id].x; n.y = _raw.pos[n.id].y;
                n.fixed = { x: true, y: true };
                pinnedIds.push(n.id);
            }
        });
        var iters2 = Math.min(Math.max(nCount * 3, 150), 500);
        options.physics.stabilization = { enabled: true, iterations: Math.max(iters2 - 40, 80), updateInterval: 50 };
    } else {
        // Fresh layout (Render, or nothing cached): deterministic thanks to the
        // pinned randomSeed set in Python (issue #141).
        var iters = Math.min(Math.max(nCount * 3, 150), 500);
        var batchIters = Math.max(iters - 40, 80);
        options.physics.stabilization = { enabled: true, iterations: batchIters, updateInterval: 50 };
    }
    var nodes = new vis.DataSet(nodeArr);
    network = new vis.Network(el, {nodes: nodes, edges: edges}, options);
    document.getElementById('download-btn').style.display = 'flex';
    document.getElementById('fullscreen-btn').style.display = 'flex';
    // Restore selection + viewport after a genuine re-mount (e.g. the panel
    // toggled), so the node stays highlighted and the zoom/pan don't reset —
    // making the rebuild invisible. selectNodes() does not fire selectNode, so
    // this doesn't loop back to Streamlit.
    if (args.selected_node !== null && args.selected_node !== undefined) {
        try { network.selectNodes([args.selected_node]); } catch (e) {}
    }
    // --- Find & centre (issue #144) ---------------------------------------
    // Python sends focus_node (the entity picked in "Find entity", present on
    // every render while it stays picked) and focus_seq (bumps only on a fresh
    // pick). The component iframe can re-mount between renders and renderGraph
    // rebuilds the whole network each render, so window state isn't reliable —
    // we keep the find state in sessionStorage like the viewport cache above.
    // While a pick is active we "pin" the camera on the node and keep it
    // selected across rebuilds instead of restoring the (now stale) saved
    // viewport; the pin is released the moment the user clicks or drags, so we
    // never fight them, and a fresh pick (new seq) re-arms it.
    var _find = {};
    try { _find = JSON.parse(sessionStorage.getItem('viz_find') || '{}') || {}; } catch (e) {}
    if (_find.seq !== args.focus_seq) {
        _find = {seq: args.focus_seq, released: false, centred: false};
    }
    var _pin = (!_find.released && args.focus_node && nodes.get(args.focus_node))
        ? args.focus_node : null;
    // Hold the camera on the pinned node across this rebuild instead of
    // restoring the (now stale) saved viewport; otherwise use the saved view.
    if (savedView && !_pin) {
        try { network.moveTo({scale: savedView.scale, position: savedView.position}); } catch (e) {}
    }
    if (_pin) {
        var _findFresh = !_find.centred;
        try { network.selectNodes([_pin]); } catch (e) {}
        try {
            network.focus(_pin, {
                scale: 1.1,
                animation: _find.centred ? false : {duration: 700, easingFunction: 'easeInOutQuad'}
            });
        } catch (e) {}
        if (_findFresh) sendFindSelection(_pin);
        _find.centred = true;
    }
    try { sessionStorage.setItem('viz_find', JSON.stringify(_find)); } catch (e) {}
    // Release the pin the moment the user takes control (click or drag), so we
    // never fight their navigation; a fresh Find pick (new seq) re-arms it.
    function _releaseFindPin() {
        try {
            var f = JSON.parse(sessionStorage.getItem('viz_find') || '{}') || {};
            f.released = true;
            sessionStorage.setItem('viz_find', JSON.stringify(f));
        } catch (e) {}
    }
    network.on('dragStart', _releaseFindPin);
    network.on('click', _releaseFindPin);
    // Cache the layout AND viewport so re-mounts restore both instantly. Save
    // after the settle animation has frozen (not on stabilizationIterationsDone,
    // which fires ~500ms before the freeze while nodes still move), and after any
    // user drag/zoom, so the cache matches what's on screen (Codex review #84).
    function savePositions() {
        try {
            sessionStorage.setItem('viz_pos', JSON.stringify({
                seq: args.seq, hash: nodeHash, pos: network.getPositions(),
                view: {scale: network.getScale(), position: network.getViewPosition()}
            }));
        } catch (e) {}
    }
    var saveTimer = null;
    function scheduleSave() {
        if (saveTimer) clearTimeout(saveTimer);
        saveTimer = setTimeout(savePositions, 400);
    }
    network.on('dragEnd', scheduleSave);
    network.on('zoom', scheduleSave);
    if (!usedSaved) {
        network.once('stabilizationIterationsDone', function() {
            setTimeout(function() {
                network.setOptions({ physics: { enabled: false } });
                // Release the frozen-existing pins now that physics is off (so
                // they won't move), keeping those nodes draggable (issue #141).
                if (pinnedIds.length) {
                    try {
                        nodes.update(pinnedIds.map(function(id) {
                            return { id: id, fixed: false };
                        }));
                    } catch (e) {}
                }
                savePositions();
            }, 500);
        });
    }

    // Build dynamic legend from actual nodes and edges
    var nodeColors = {};
    nodes.forEach(function(n) {
        var bg = n.color && (typeof n.color === 'string' ? n.color : n.color.background);
        if (!bg) return;
        var key = bg.toUpperCase();
        if (!nodeColors[key]) nodeColors[key] = true;
    });
    var edgeColors = {};
    edges.forEach(function(e) {
        var c = typeof e.color === 'string' ? e.color : (e.color && e.color.color) || '';
        var lbl = (e.label || '').toLowerCase();
        if (c) edgeColors[c.toUpperCase() + '|' + lbl] = true;
    });

    var nodeItems = [
        {color: '#4CAF50', label: 'Classes'},
        {color: '#2196F3', label: 'Obj Props'},
        {color: '#9C27B0', label: 'Data Props'},
        {color: '#FF9800', label: 'Individuals'},
        {color: '#795548', label: 'Annotations'},
        {color: '#00897B', label: 'SKOS'},
        {color: '#90A4AE', label: 'Triples'}
    ];
    var edgeItems = [
        {color: '#81C784', label: 'subClassOf', match: 'subclassof', dashed: false},
        {color: '#2196F3', label: 'Object Prop', match: null, dashed: false},
        {color: '#CE93D8', label: 'Data Prop', match: null, dashed: true},
        {color: '#FFB74D', label: 'type', match: 'type', dashed: false},
        {color: '#9C27B0', label: 'equivalent', match: 'equivalentclass', dashed: false},
        {color: '#F44336', label: 'disjoint', match: 'disjointwith', dashed: false},
        {color: '#A1887F', label: 'annotation', match: null, dashed: true},
        {color: '#26A69A', label: 'broader', match: 'broader', dashed: false},
        {color: '#80CBC4', label: 'related', match: 'related', dashed: true},
        {color: '#90A4AE', label: 'triple', match: null, dashed: false}
    ];

    var nodeLegend = '';
    nodeItems.forEach(function(item) {
        if (nodeColors[item.color.toUpperCase()]) {
            nodeLegend += '<span class="dot" style="background:' + item.color + ';"></span> ' + item.label + '  ';
        }
    });
    var edgeLegend = '';
    edgeItems.forEach(function(item) {
        var found = false;
        var uc = item.color.toUpperCase();
        for (var k in edgeColors) {
            if (k.indexOf(uc) === 0) { found = true; break; }
        }
        if (found) {
            var cls = item.dashed ? 'line dashed' : 'line solid';
            edgeLegend += '<span class="' + cls + '" style="border-color:' + item.color + ';"></span> ' + item.label + ' &nbsp;';
        }
    });

    var legendEl = document.getElementById('legend');
    legendEl.style.background = theme.panel;
    legendEl.style.color = theme.text;
    if (nodeLegend || edgeLegend) {
        legendEl.innerHTML = (nodeLegend ? '<div class="row">' + nodeLegend + '</div>' : '') +
                             (edgeLegend ? '<div class="row">' + edgeLegend + '</div>' : '');
        legendEl.style.display = '';
    } else {
        legendEl.style.display = 'none';
    }

    network.on('selectNode', function(params) {
        var nd = nodes.get(params.nodes[0]);
        sendToStreamlit("streamlit:setComponentValue", {
            value: {nodeId: params.nodes[0], ntype: nd.ntype || null, ename: nd.ename || null, label: nd.label, title: nd.title || '', selected: true}
        });
    });
    network.on('selectEdge', function(params) {
        if (params.nodes.length === 0 && params.edges.length > 0) {
            var ed = edges.get(params.edges[0]);
            sendToStreamlit("streamlit:setComponentValue", {
                value: {ntype: ed.ntype || null, ename: ed.ename || null, label: ed.label || '', title: ed.title || '', selected: true, isEdge: true}
            });
        }
    });
    network.on('deselectNode', function() {
        sendToStreamlit("streamlit:setComponentValue", {value: {selected: false}});
    });
    network.on('deselectEdge', function() {
        sendToStreamlit("streamlit:setComponentValue", {value: {selected: false}});
    });

    // Ctrl/Cmd-click a node to add it to the "Focus on one node" selection, so
    // the graph narrows to that node's neighbourhood without typing its name
    // into the focus picker (issue #56). reqId makes each request distinct so
    // the Python side applies it once. Sent after the normal selectNode value,
    // so this is the value Streamlit keeps for this interaction.
    network.on('click', function(params) {
        if (!params.nodes.length) return;
        var ev = params.event && params.event.srcEvent;
        if (!ev || !(ev.ctrlKey || ev.metaKey)) return;
        sendToStreamlit("streamlit:setComponentValue", {
            value: {focusRequest: true, reqId: Date.now(), nodeId: params.nodes[0]}
        });
    });
}

window.addEventListener("message", function(event) {
    if (event.data.type === "streamlit:render") {
        renderGraph(event.data.args);
    }
});

sendToStreamlit("streamlit:componentReady", {apiVersion: 1});

// Load vis-network dynamically
var script = document.createElement('script');
script.onload = function() {
    visLoaded = true;
    if (pendingArgs) { renderGraph(pendingArgs); pendingArgs = null; }
};
script.src = "vis-network.min.js";
document.head.appendChild(script);
</script>
</body>
</html>
