name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      # Report every version's result, rather than cancelling siblings on the
      # first failure, so a version-specific break is obvious.
      fail-fast: false
      matrix:
        # 3.14 is the base image the Docker image ships (see Dockerfile). 3.12 is
        # Streamlit Community Cloud's default and the oldest runtime we keep
        # green. The hosted app's interpreter is picked in Community Cloud's
        # Advanced settings at deploy time and is not recorded in this repo, so
        # this floor is a deliberate choice rather than a reading of the deploy.
        python: ["3.12", "3.14"]
    name: check (py${{ matrix.python }})
    steps:
      - uses: actions/checkout@v7

      # python-version sets UV_PYTHON, binding every uv command below to the
      # matrix interpreter: uv is otherwise free to pick any python satisfying
      # requires-python, so a leg could silently test a version other than the
      # one it names. It also feeds setup-uv's cache key, which would otherwise
      # be computed from the runner's system python and so collide across legs.
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}

      - name: Set up Python
        run: uv python install ${{ matrix.python }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Verify interpreter
        run: |
          actual=$(uv run python -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          echo "matrix=${{ matrix.python }} actual=$actual"
          [ "$actual" = "${{ matrix.python }}" ] || { echo "::error::expected Python ${{ matrix.python }}, got $actual"; exit 1; }

      - name: Lint (ruff)
        run: uv run ruff check orionbelt_ontology_builder tests app.py ontology_manager.py templates.py

      - name: Format check (ruff)
        run: uv run ruff format --check orionbelt_ontology_builder tests app.py ontology_manager.py templates.py

      - name: Type check (mypy)
        run: uv run mypy orionbelt_ontology_builder

      - name: Test (pytest)
        run: uv run pytest

  # Guards against regression of issue #68: the `desktop` extra must install a
  # resolvable pywebview Qt backend (qtpy + PySide6) on Linux. We only need the
  # GUI base libraries so PySide6.QtGui imports; the full QtWebEngine widget
  # additionally needs Chromium runtime libs that are the host desktop's concern.
  desktop-extra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Qt GUI runtime libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            libgl1 libegl1 libxkbcommon0 libdbus-1-3 libglib2.0-0 \
            libfontconfig1 libfreetype6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install with desktop extra
        run: uv sync --extra desktop

      - name: Verify Qt backend resolves
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          uv run python - <<'PY'
          from qtpy import QtCore  # raised ModuleNotFoundError: qtpy before the fix (issue #68)
          import qtpy
          print("qtpy binding ->", qtpy.API_NAME)
          assert qtpy.API_NAME == "PySide6", qtpy.API_NAME
          print("PASS: desktop extra provides a resolvable Qt backend")
          PY
