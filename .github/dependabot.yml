# Dependabot configuration.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
#
# Weekly, grouped updates to keep noise low. Major Python bumps are ungrouped so
# they get an individual PR to review; minor/patch are batched into one.
version: 2
updates:
  # Python dependencies. pyproject.toml plus uv.lock are the single source of
  # truth: uv.lock installs the Streamlit Cloud app and the Docker image, and
  # pyproject.toml drives the PyPI release.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    ignore:
      # streamlit is deliberately pinned (==1.49.1) rather than ranged, so its
      # upgrades are done by hand after checking the app against the release.
      # Exact name only: streamlit-local-storage and streamlit-desktop-app are
      # still updated.
      - dependency-name: "streamlit"
    groups:
      python-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the workflows in .github/workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      github-actions:
        patterns:
          - "*"

  # Base images in the Dockerfile (python and the pinned uv stage).
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      docker:
        patterns:
          - "*"
